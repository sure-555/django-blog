<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Alpha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
</head>
<body >
    <header class="p-3 bg-dark text-white">
        <div class="row">
            <div class="col">
                <a class="text-decoration-none text-light" href={%url 'alpha:index' %}><h3>Alpha</h3></a>
            </div>
            <div class="col">
                <div class="d-flex justify-content-center gap-3">
                    <a class="text-light text-decoration-none" href="{% url 'alpha:index' %}">Home</a>
                    <a class="text-light text-decoration-none" href="{% url 'alpha:about' %}">About</a>
                    <a class="text-light text-decoration-none" href="{% url 'alpha:contact' %}">Contact</a>
                    {% if user.is_authenticated%}
                    <a class="text-light text-decoration-none" href="{% url 'alpha:dashboard' %}">Dashboard</a>
                    <a class="text-light text-decoration-none" href="{% url 'alpha:logout' %}">Logout</a>
                    {%else%}
                    <a class="text-light text-decoration-none" href="{% url 'alpha:login' %}">Login</a>
                    <a class="text-light text-decoration-none" href="{% url 'alpha:register' %}">Register</a>
                    {%endif%}
                </div>
            </div>
        </div>
    </header>
